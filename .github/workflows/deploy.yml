name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 0' # 매주 일요일 18:00 UTC — 데이터 재적재 후 재배포

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # 시크릿 ASSEMBLY_API_KEY 가 있으면 최신 데이터로 재적재(curl 우회는 러너에서 동작).
      # 없으면 repo에 커밋된 snapshots/ 로 빌드.
      - name: Refresh snapshots
        if: ${{ env.ASSEMBLY_API_KEY != '' }}
        continue-on-error: true
        run: npm run snapshot

      - name: Build (Astro, static)
        env:
          PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
